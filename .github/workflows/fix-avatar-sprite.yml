name: Fix Avatar Sprite Animation

on:
  workflow_dispatch:

jobs:
  fix-sprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fix avatar walking animation
        run: |
          python3 << 'EOF'
          import re

          with open("index.html", "r") as f:
              content = f.read()

          # Strip all previous avatar style injections
          content = re.sub(r'<style>\s*\.avatar-walk.*?</style>', '', content, flags=re.DOTALL)

          avatar_css = """<style>
          .avatar-walk {
            position: fixed;
            bottom: 40px;
            z-index: 999;
            width: 140px;
            height: auto;
            animation:
              walkAcross 16s linear infinite,
              walkBounce 0.4s ease-in-out infinite;
            transform-origin: bottom center;
          }
          @keyframes walkAcross {
            0%   { left: -160px;             transform: scaleX(1); }
            47%  { left: calc(100vw + 20px); transform: scaleX(1); }
            50%  { left: calc(100vw + 20px); transform: scaleX(-1); }
            97%  { left: -160px;             transform: scaleX(-1); }
            100% { left: -160px;             transform: scaleX(1); }
          }
          @keyframes walkBounce {
            0%   { margin-bottom: 0px;  }
            25%  { margin-bottom: 8px;  }
            50%  { margin-bottom: 0px;  }
            75%  { margin-bottom: 8px;  }
            100% { margin-bottom: 0px;  }
          }
          </style>"""

          content = content.replace("</head>", avatar_css + "\n</head>", 1)

          with open("index.html", "w") as f:
              f.write(content)

          print("Done.")
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Agent"
          git config user.email "agent@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/cogaston0/usataxgpt.git
          git add index.html
          git commit -m "Fix: avatar walk bounce animation for natural walking look" || echo "No changes"
          git push
