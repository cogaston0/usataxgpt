name: Fix Avatar Sprite Animation

on:
  workflow_dispatch:

jobs:
  fix-sprite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Fix avatar to use sprite sheet
        run: |
          python3 << 'EOF'
          import re

          with open("index.html", "r") as f:
              content = f.read()

          # Remove the JS script we added
          content = re.sub(
              r'\s*<script>\s*\(function\(\)\{.*?\}\)\(\);\s*</script>',
              '', content, flags=re.DOTALL)

          # Empty the taxAvatar div (remove any img inside)
          content = re.sub(
              r'(<div[^>]*id=["\']taxAvatar["\'][^>]*>).*?(</div>)',
              r'\1\2', content, flags=re.DOTALL)

          # Remove old #taxAvatar or .tax-avatar CSS
          content = re.sub(
              r'#taxAvatar\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          content = re.sub(
              r'\.tax-avatar\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          content = re.sub(
              r'@keyframes walk\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          content = re.sub(
              r'@keyframes walkAcross\s*\{[^}]*\}', '', content, flags=re.DOTALL)
          content = re.sub(
              r'@keyframes walkBounce\s*\{[^}]*\}', '', content, flags=re.DOTALL)

          # Inject clean sprite CSS before </head>
          sprite_css = """<style>
          #taxAvatar {
            position: fixed;
            bottom: 40px;
            left: -170px;
            width: 170px;
            height: 170px;
            background-image: url('femaleOffice_walk.png');
            background-repeat: no-repeat;
            background-position: 0 0;
            background-size: auto 170px;
            z-index: 999;
            animation:
              walk 2s steps(8) infinite,
              walkAcross 18s linear infinite;
          }
          @keyframes walk {
            from { background-position: 0 0; }
            to   { background-position: -1360px 0; }
          }
          @keyframes walkAcross {
            0%   { left: -170px;             transform: scaleX(1); }
            47%  { left: calc(100vw + 20px); transform: scaleX(1); }
            50%  { left: calc(100vw + 20px); transform: scaleX(-1); }
            97%  { left: -170px;             transform: scaleX(-1); }
            100% { left: -170px;             transform: scaleX(1); }
          }
          </style>"""

          content = content.replace("</head>", sprite_css + "\n</head>", 1)

          with open("index.html", "w") as f:
              f.write(content)

          print("Done.")
          EOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Agent"
          git config user.email "agent@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/cogaston0/usataxgpt.git
          git add index.html
          git commit -m "Fix: sprite sheet walk animation on taxAvatar" || echo "No changes"
          git push
